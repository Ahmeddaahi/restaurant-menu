<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant menu | QR Menu</title>
    <meta name="description" content="Premium QR code menu for restaurants.">
    <meta name="color-scheme" content="light">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Preload Hero Image -->
    <link rel="preload" as="image" href="images/hero.png" fetchpriority="high">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#31642D',
                        secondary: '#F37021',
                        accent: '#D4DF22',
                        surface: '#F8F9FA'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-[#F8F9FA]">

    <!-- Header -->
    <header class="px-6 py-2 flex items-center justify-between bg-[#F8F9FA] sticky top-0 z-[60]">
        <!-- Restaurant Logo & Name -->
        <div class="flex items-center gap-2">
            <div class="w-24 h-24 flex items-center justify-center overflow-hidden">
                <img src="images/logo.png" alt="Nadi's Logo" class="w-full h-full object-contain">
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex gap-1 bg-gray-200/50 p-1 rounded-xl">
                <button id="lang-so" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all">SO</button>
                <button id="lang-en" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all">EN</button>
            </div>

            <div class="relative">
                <button id="cart-btn-main"
                    class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-800 active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="cart-badge" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pb-32">
        <!-- Hero Section -->
        <section id="hero-section" class="px-6 py-2">
            <div class="relative h-44 rounded-[32px] overflow-hidden shadow-xl animate-slide-up">
                <img src="images/hero.png" alt="Nadi's Fresh Juice" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
                <div class="absolute bottom-6 left-8 right-8">
                    <span class="text-accent font-bold text-xs uppercase tracking-widest mb-1 block"
                        data-translate="heroSubtitle">Fresh & Healthy</span>
                    <h1 class="text-white text-2xl font-bold leading-tight" data-translate="heroTitle">Welcome to Nadi's
                        Fresh Juice</h1>
                </div>
            </div>
        </section>

        <!-- Search Section -->
        <section id="search-section" class="px-6 py-2 sticky-search z-50">
            <!-- Search Bar -->
            <div class="relative flex items-center">
                <input type="text" id="search-input"
                    class="w-full bg-white border-none rounded-2xl py-3 pl-12 pr-4 text-sm shadow-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                    placeholder="Search dishes, restaurants...">
                <div class="absolute left-4 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section id="category-nav" class="sticky-category">
            <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="category-list">
                <!-- Categories will be injected here -->
            </div>
        </section>

        <!-- Menu Grid -->
        <section class="px-6 mt-2">
            <div class="grid grid-cols-2 gap-x-4 gap-y-6" id="menu-grid">
                <!-- Menu items will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-6 inset-x-6 h-16 bg-white/80 backdrop-blur-lg rounded-2xl shadow-lg border border-gray-200 flex justify-around items-center z-[100]">
        <div class="flex flex-col items-center gap-1 text-primary cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <a href="admin.html"
            class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </a>
    </nav>

    <script type="module" src="script.js"></script>
</body>

</html>
