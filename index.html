<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nadicafe menu | QR Menu</title>
    <meta name="description" content="Welcome to Nadi Cafe - The best fresh juices, smoothies, and healthy snacks in Jigjiga. Explore our digital QR menu and order your favorites today.">
    <meta name="color-scheme" content="light">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.webp">
    <link rel="apple-touch-icon" href="images/logo.webp">
    <link rel="manifest" href="manifest.json">

    <!-- Structured Data for Google Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nadi Cafe",
      "url": "https://www.nadicafe.com",
      "logo": "https://www.nadicafe.com/images/logo.webp",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Nadi Cafe",
      "url": "https://www.nadicafe.com"
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.nadicafe.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Preload LCP Images -->
    <link rel="preload" as="image" href="images/logo.webp" fetchpriority="high">
    <link rel="preload" as="image" href="images/de44e0ea-d57c-44d7-8f91-24b0f07a46a0.webp" fetchpriority="high">

    <!-- Performance Optimized CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">

    <!-- FOUC Prevention: Only show body once Tailwind has processed or CSS is loaded -->
    <script>
        document.documentElement.style.visibility = 'hidden';
        window.addEventListener('DOMContentLoaded', () => {
            document.documentElement.style.visibility = 'visible';
            document.body.style.opacity = '1';
        });
    </script>
        <style>
            :root { visibility: visible !important; }
            body { opacity: 1 !important; }
        </style>
    </noscript>

</head>

<body class="bg-[#F8F9FA]">

    <!-- Header -->
    <header class="px-2 py-1 flex items-center justify-between bg-[#F8F9FA] sticky top-0 z-[60]" style="display: none;">
        <!-- Restaurant Logo & Name -->
        <div class="flex items-center gap-2">
            <div class="w-28 h-28 flex items-center justify-center overflow-hidden">
                <img src="images/logo.webp" alt="Nadi's Logo" width="112" height="112" class="w-full h-full object-contain" fetchpriority="high">
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative flex bg-gray-100 p-1 rounded-2xl w-24 h-9 shadow-inner border border-gray-200/50" id="lang-toggle-container">
                <!-- Sliding Indicator -->
                <div id="lang-indicator" class="absolute top-1 left-1 w-[46px] h-7 rounded-xl shadow-md transition-all duration-300 ease-out z-0"></div>
                
                <button id="lang-so" aria-label="Switch to Somali" class="relative z-10 flex-1 flex items-center justify-center text-[11px] font-bold transition-colors duration-300">SO</button>
                <button id="lang-en" aria-label="Switch to English" class="relative z-10 flex-1 flex items-center justify-center text-[11px] font-bold transition-colors duration-300">EN</button>
            </div>

            <div class="relative">
                <button id="cart-btn-main" aria-label="View shopping cart"
                    class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-800 active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="cart-badge" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pb-32" style="display: none;">
        <!-- Hero Section -->
        <section id="hero-section" class="px-6 py-2">
            <div class="relative h-44 rounded-[32px] overflow-hidden shadow-xl animate-slide-up">
                <img src="images/de44e0ea-d57c-44d7-8f91-24b0f07a46a0.webp" alt="Nadi's Fresh Juice" width="800" height="176" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
                <div class="absolute bottom-6 left-8 right-8">
                    <span class="text-accent font-bold text-xs uppercase tracking-widest mb-1 block"
                        data-translate="heroSubtitle">Fresh & Healthy</span>
                    <h1 class="text-white text-2xl font-bold leading-tight" data-translate="heroTitle">Welcome to Nadi's
                        Fresh Juice</h1>
                </div>
            </div>
        </section>


        <!-- Categories -->
        <section id="category-nav" class="sticky-category">
            <h2 class="sr-only">Menu Categories</h2>
            <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="category-list">
                <!-- Categories will be injected here -->
            </div>
        </section>

        <!-- Menu Grid -->
        <section class="px-6 mt-2">
            <h2 class="sr-only">Food and Drinks</h2>
            <div class="grid grid-cols-2 gap-x-4 gap-y-6" id="menu-grid">
                <!-- Menu items will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 inset-x-6 h-14 bg-white/70 backdrop-blur-2xl rounded-2xl shadow-xl border border-white/20 flex justify-around items-center z-[100]" style="bottom: 1.5rem;">
        <div id="footer-home" class="flex flex-col items-center gap-1 text-primary cursor-pointer transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Menu</span>
        </div>
        <div id="footer-about" class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">About</span>
        </div>
        <a id="footer-review" href="reviews.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Review</span>
        </a>
    </nav>

    <script type="module" src="script.js"></script>
</body>

</html>
