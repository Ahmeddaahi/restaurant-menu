<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant menu | QR Menu</title>
    <meta name="description" content="Premium QR code menu for restaurants.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Preload Hero Image -->
    <link rel="preload" as="image" href="images/cafe_hero_image_1776858412797.png" fetchpriority="high">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF4747',
                        secondary: '#8E8E93',
                        surface: '#F8F9FA'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-[#F8F9FA]">

    <!-- Header -->
    <header class="px-6 py-5 flex items-center justify-between bg-[#F8F9FA] sticky top-0 z-[60]">
        <!-- Restaurant Logo & Name -->
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                </svg>
            </div>
            <span class="font-bold text-gray-900 hidden sm:block">Sky Garden</span>
        </div>

        <h1 class="text-lg font-bold text-gray-900 absolute left-1/2 -translate-x-1/2" data-translate="menuTab">Menu</h1>

        <div class="flex items-center gap-3">
            <div class="flex gap-1 bg-gray-200/50 p-1 rounded-xl">
                <button id="lang-so" onclick="switchLanguage('so')" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all">SO</button>
                <button id="lang-en" onclick="switchLanguage('en')" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all">EN</button>
            </div>
            
            <div class="relative">
                <button class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-800 active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="cart-badge">3</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pb-24">
        <!-- Search Section -->
        <section class="px-6 space-y-4">
            <!-- Search Bar -->
            <div class="relative flex items-center">
                <input type="text" id="search-input" 
                    class="w-full bg-white border-none rounded-2xl py-4 pl-12 pr-4 text-sm shadow-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                    placeholder="Search dishes, restaurants...">
                <div class="absolute left-4 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section id="category-nav" class="sticky-category">
            <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="category-list">
                <!-- Categories will be injected here -->
            </div>
        </section>

        <!-- Menu Grid -->
        <section class="px-6 mt-2">
            <div class="grid grid-cols-2 gap-x-4 gap-y-6" id="menu-grid">
                <!-- Menu items will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 inset-x-6 h-16 bg-white/90 backdrop-blur-lg rounded-2xl shadow-lg border border-gray-100 flex justify-around items-center z-[100]">
        <div class="flex flex-col items-center gap-1 text-primary cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <a href="admin.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </a>
    </nav>

    <script type="module" src="script.js"></script>
</body>

</html>
