<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant menu | QR Menu</title>
    <meta name="description" content="Premium QR code menu for restaurants.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Preload Hero Image -->
    <link rel="preload" as="image" href="images/cafe_hero_image_1776858412797.png" fetchpriority="high">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            primary: '#3E2723', // Deep Brown
                            secondary: '#FF9800', // Warm Orange
                            accent: '#F5F5DC', // Cream
                            dark: '#1A0F0D',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="index.css">
</head>

<body class="text-brand-dark">

    <!-- Header -->
    <header class="px-6 py-4 flex items-center justify-between bg-white shadow-sm sticky top-0 z-[60] transform-gpu">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-brand-primary rounded-xl flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Jua Café</h1>
        </div>

        <div class="flex items-center gap-2 bg-gray-100 p-1 rounded-full">
            <button id="lang-so" onclick="switchLanguage('so')"
                class="px-3 py-1 rounded-full text-xs font-bold transition-all">SO</button>
            <button id="lang-en" onclick="switchLanguage('en')"
                class="px-3 py-1 rounded-full text-xs font-bold transition-all">EN</button>
        </div>

        <button id="search-toggle" class="p-2 bg-gray-100 rounded-full transition-colors active:bg-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </header>

    <!-- Search Bar Container -->
    <div id="search-bar-container" class="px-6 py-2 bg-white shadow-sm overflow-hidden h-0 opacity-0 transition-all duration-300 ease-in-out">
        <div class="relative flex items-center">
            <input type="text" id="search-input" 
                class="w-full bg-gray-100 border-none rounded-2xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand-secondary outline-none transition-all"
                placeholder="Search food or drinks...">
            <div class="absolute left-4 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <main class="pb-20">
        <!-- Hero Section -->
        <section class="px-6 py-6">
            <div class="relative h-48 rounded-3xl overflow-hidden shadow-xl">
                <img src="images/cafe_hero_image_1776858412797.png" alt="Jua Café Hero"
                    class="w-full h-full object-cover" fetchpriority="high" decoding="async">
                <div
                    class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col justify-end p-6">
                    <p class="text-brand-secondary font-semibold text-xs uppercase tracking-widest mb-1">Authentic
                        Hearth</p>
                    <h2 class="text-white text-2xl font-bold">Welcome to the Coffee Ceremony</h2>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section id="category-nav" class="sticky-category py-4">
            <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="category-list">
                <!-- Categories will be injected here -->
            </div>
        </section>

        <!-- Menu Grid -->
        <section class="px-6 mt-6">
            <div class="grid grid-cols-2 gap-4" id="menu-grid">
                <!-- Menu items will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Nav (Mobile Feel) -->
    <nav
        class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-6 py-3 flex justify-around items-center z-[100] transform-gpu">
        <div class="flex flex-col items-center gap-1 text-brand-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <span class="text-[10px] font-semibold">Menu</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            <span class="text-[10px]">Favorites</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-[10px]">History</span>
        </div>
    </nav>

    <script type="module" src="script.js"></script>
</body>

</html>
