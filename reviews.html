<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratings and Reviews | Nadi's Fresh Juice</title>
    <meta name="color-scheme" content="light">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">

    <!-- FOUC Prevention -->
    <script>
        document.documentElement.style.visibility = 'hidden';
        window.addEventListener('DOMContentLoaded', () => {
            document.documentElement.style.visibility = 'visible';
            document.body.style.opacity = '1';
        });
    </script>
    <noscript>
        <style>
            :root { visibility: visible !important; }
            body { opacity: 1 !important; }
        </style>
    </noscript>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .progress-bar-bg {
            background-color: #e5e7eb;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            flex-grow: 1;
        }

        .progress-bar-fill {
            background-color: #31642d;
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .star-btn {
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #e5e7eb;
        }
        
        .star-btn.active {
            color: #f37021;
            fill: #f37021;
        }

        .star-btn.hover {
            color: #f37021;
            opacity: 0.7;
        }

        .submit-btn {
            background: #31642d;
            position: relative;
            overflow: hidden;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(20px);
            opacity: 0;
            transition: all 0.3s;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .submit-btn.loading .btn-content {
            opacity: 0;
            transform: translateY(-20px);
        }

        .submit-btn.loading .loader {
            opacity: 1;
            transform: translate(-50%, -50%) translateY(0);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .success-message {
            display: none;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .avatar-circle {
            background: #f3f4f6;
            color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Fluid Typography */
        .fluid-title {
            font-size: clamp(1.5rem, 6vw, 2.25rem);
            line-height: 1.2;
        }
        .fluid-rating {
            font-size: clamp(3rem, 12vw, 4.5rem);
            line-height: 1;
        }
        .fluid-subtitle {
            font-size: clamp(0.75rem, 3vw, 0.875rem);
        }
    </style>
</head>
<body class="bg-[#F8F9FA] min-h-screen flex flex-col font-sans">
    


    <main class="flex-grow p-6 space-y-10 max-w-2xl mx-auto w-full pb-24">
        
        <!-- Header Style from About Us -->
        <div class="flex items-center gap-4 mb-6">
            <a href="index.html" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-800 transition-all hover:bg-gray-50" aria-label="Go back">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <div>
                <p class="fluid-subtitle text-gray-500">Rate Our Service</p>
                <h2 class="fluid-title font-bold text-gray-900">Ratings and reviews</h2>
            </div>
        </div>

        <!-- Summary Section (Play Store Style) -->
        <section class="grid grid-cols-1 md:grid-cols-[140px_1fr] gap-8 items-center">
            <div class="text-center">
                <h2 id="avg-rating-large" class="fluid-rating font-black text-gray-900">0.0</h2>
                <div class="flex justify-center gap-0.5 text-secondary mt-2" id="avg-stars-summary">
                    <!-- Dynamic Stars -->
                </div>
                <p id="total-reviews-count" class="text-[clamp(10px,2.5vw,12px)] font-bold text-gray-400 mt-2">0 reviews</p>
            </div>

            <div class="space-y-1.5 flex-grow">
                <!-- 5 Stars Bar -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-700 w-2">5</span>
                    <div class="progress-bar-bg"><div id="bar-5" class="progress-bar-fill"></div></div>
                </div>
                <!-- 4 Stars Bar -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-700 w-2">4</span>
                    <div class="progress-bar-bg"><div id="bar-4" class="progress-bar-fill"></div></div>
                </div>
                <!-- 3 Stars Bar -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-700 w-2">3</span>
                    <div class="progress-bar-bg"><div id="bar-3" class="progress-bar-fill"></div></div>
                </div>
                <!-- 2 Stars Bar -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-700 w-2">2</span>
                    <div class="progress-bar-bg"><div id="bar-2" class="progress-bar-fill"></div></div>
                </div>
                <!-- 1 Star Bar -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-700 w-2">1</span>
                    <div class="progress-bar-bg"><div id="bar-1" class="progress-bar-fill"></div></div>
                </div>
            </div>
        </section>

        <hr class="border-gray-100">

        <!-- Submission Section -->
        <section class="space-y-6">
            <div id="submission-trigger" class="flex flex-col items-center py-4 bg-gray-50 rounded-3xl border border-dashed border-gray-200">
                <p class="text-sm font-bold text-gray-700 mb-4">Rate our fresh juice</p>
                <div class="flex gap-4">
                    <button type="button" class="star-btn p-1" onclick="openReviewForm(1)">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                    </button>
                    <button type="button" class="star-btn p-1" onclick="openReviewForm(2)">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                    </button>
                    <button type="button" class="star-btn p-1" onclick="openReviewForm(3)">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                    </button>
                    <button type="button" class="star-btn p-1" onclick="openReviewForm(4)">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                    </button>
                    <button type="button" class="star-btn p-1" onclick="openReviewForm(5)">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
                    </button>
                </div>
                <button onclick="openReviewForm(5)" class="mt-4 text-primary text-xs font-bold hover:underline">Write a review</button>
            </div>

            <!-- Floating Form (Hidden by Default) -->
            <div id="review-modal" class="hidden glass-card rounded-4xl p-8 space-y-6 animate-slide-up shadow-2xl border border-primary/10">
                <div class="flex justify-between items-start">
                    <h3 class="text-[clamp(1.125rem,4vw,1.5rem)] font-bold text-gray-900">How was your juice?</h3>
                    <button onclick="closeReviewForm()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <form id="review-form" class="space-y-6">
                    <div class="flex flex-col items-center space-y-2">
                        <div class="flex gap-2" id="form-stars">
                            <!-- Injected via JS -->
                        </div>
                        <span id="rating-label" class="text-[clamp(10px,2.5vw,12px)] font-bold text-gray-400 uppercase tracking-widest">Select Rating</span>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[clamp(9px,2vw,11px)] font-black text-gray-400 uppercase tracking-widest px-1">Your Name</label>
                        <input type="text" id="reviewer-name" required maxlength="50"
                            class="w-full bg-gray-50/50 border border-gray-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"
                            placeholder="e.g. Ahmed Daahi">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[clamp(9px,2vw,11px)] font-black text-gray-400 uppercase tracking-widest">Feedback Details</label>
                            <span id="char-counter" class="text-[clamp(9px,2vw,11px)] font-bold text-gray-400">0/500</span>
                        </div>
                        <textarea id="feedback-text" maxlength="500" 
                            class="w-full bg-gray-50/50 border border-gray-100 rounded-2xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all h-32 resize-none"
                            placeholder="Share your experience..."></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="submit-btn w-full text-white py-4 rounded-2xl font-bold text-[clamp(0.875rem,3vw,1rem)] tracking-wide shadow-lg shadow-primary/20 transition-all active:scale-95">
                        <div class="btn-content">Submit Review</div>
                        <div class="loader"></div>
                    </button>
                </form>
            </div>

            <!-- Success State -->
            <div id="success-state" class="success-message hidden text-center space-y-4 py-8">
                <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-gray-900">Posted!</h3>
                    <p class="text-sm text-gray-500">Thanks for sharing your feedback.</p>
                </div>
                <button onclick="resetForm()" class="text-primary font-bold text-sm hover:underline">Write another</button>
            </div>
        </section>

        <!-- Reviews List (Play Store Style) -->
        <section class="space-y-8 pb-10" id="reviews-list">
            <!-- Dynamic Reviews -->
        </section>


    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 inset-x-6 h-14 bg-white/70 backdrop-blur-2xl rounded-2xl shadow-xl border border-white/20 flex justify-around items-center z-[100]" style="bottom: 1.5rem;">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Menu</span>
        </a>
        <a href="index.html#about" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">About</span>
        </a>
        <a href="reviews.html" class="flex flex-col items-center gap-1 text-primary transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Review</span>
        </a>
    </nav>

    <script type="module" src="js/reviews.js"></script>
</body>
</html>
